<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Js GeoJSON to SVG</title>
  <!-- <style>svg{width:26px;height:26px;border:0px solid #ddd}</style> -->
  <!-- Latest compiled and minified CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="col-md-1">
        <svg class="w-50 h-auto js-geo-svg" data-js-geo-json-feature='
    {
  "type": "Feature",
      "properties": {
        "fill": "#ff0000"
      },
  "geometry":
{
    "type": "Polygon",
    "coordinates": [
        [
            [
                -97.3123945,
                35.8955299
            ],
            [
                -97.312372,
                35.8947022
            ],
            [
                -97.3122367,
                35.8938015
            ],
            [
                -97.3113953,
                35.8938623
            ],
            [
                -97.3114179,
                35.8943066
            ],
            [
                -97.3117184,
                35.8948969
            ],
            [
                -97.311478,
                35.8953473
            ],
            [
                -97.3123945,
                35.8955299
            ]
        ]
    ]
}
}' id="map" viewBox="0 0 800 600"></svg>
      </div>
      <div class="col-md-5">
        <p>This is a simple paragraph for demonstration purposes.</p>
      </div>
    </div>
    <div class="row">
      <div class="col-md-1">
        <svg class="w-50 h-auto js-geo-svg" data-js-geo-json-feature='{
    "type": "Polygon",
    "coordinates": [
            [
              [-98.0, 35.0],
              [-97.0, 35.0],
              [-97.0, 36.0],
              [-98.0, 36.0],
              [-98.0, 35.0]
            ]
    ]
}' id="map" viewBox="0 0 800 600"></svg>
      </div>
      <div class="col-md-5">
        <p>Simple Polygon.</p>
      </div>
    </div>
    <div class="row">
      <div class="col-md-1">
        <svg class="w-50 h-auto js-geo-svg" data-js-geo-json-feature='{
    "type": "Polygon",
    "coordinates": [
          [
            [-96.5, 35.5],
            [-95.5, 35.5],
            [-95.5, 34.5],
            [-96.5, 34.5],
            [-96.5, 35.5]
          ],
          [
            [-96.2, 35.2],
            [-96.2, 34.8],
            [-95.8, 34.8],
            [-95.8, 35.2],
            [-96.2, 35.2]
          ]
    ]
}' id="map" viewBox="0 0 800 600"></svg>
      </div>
      <div class="col-md-5">
        <p>Polygon with hole</p>
      </div>
    </div>
    <div class="row">
      <div class="col-md-1">
        <svg class="w-50 h-auto js-geo-svg" data-js-geo-json-feature='{
        "type": "Polygon",
        "coordinates": [
            [
              [-98.0, 35.0],
              [-97.0, 35.0],
              [-97.0, 36.0],
              [-98.0, 36.0],
              [-98.0, 35.0]
            ]
        ]
      }' id="map" viewBox="0 0 800 600"></svg>
      </div>
      <div class="col-md-5">
        <p>Polygon</p>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-1">
      <svg class="w-50 h-auto js-geo-svg" data-js-geo-json-feature='
      {
    "type": "Feature",
    "properties": {
        "fill": "#ff0000"
    },
    "geometry": {
        "type": "MultiPolygon",
        "coordinates": [
            [
                [
                    [
                        -98.0,
                        35.0
                    ],
                    [
                        -97.0,
                        35.0
                    ],
                    [
                        -97.0,
                        36.0
                    ],
                    [
                        -98.0,
                        36.0
                    ],
                    [
                        -98.0,
                        35.0
                    ]
                ]
            ],
            [
                [
                    [
                        -96.5,
                        35.5
                    ],
                    [
                        -95.5,
                        35.5
                    ],
                    [
                        -95.5,
                        34.5
                    ],
                    [
                        -96.5,
                        34.5
                    ],
                    [
                        -96.5,
                        35.5
                    ]
                ],
                [
                    [
                        -96.2,
                        35.2
                    ],
                    [
                        -96.2,
                        34.8
                    ],
                    [
                        -95.8,
                        34.8
                    ],
                    [
                        -95.8,
                        35.2
                    ],
                    [
                        -96.2,
                        35.2
                    ]
                ]
            ]
        ]
    }
}' id="map" viewBox="0 0 800 600"></svg>
    </div>
    <div class="col-md-5">
      <p>Multipolygon</p>
    </div>
  </div>
    <div class="row">
    <div class="col-md-1">
      <svg class="w-50 h-auto js-geo-svg" data-js-geo-json-feature='
      {
    "type": "Feature",
    "properties": {
        "fill": "#ff0000"
    },
    "geometry": {
        "type": "GeometryCollection",
        "geometries": [
          {
            "type": "MultiPoint",
            "coordinates": [
                [-97.9,35.5],
                [-97.7,35.5]

              ]
          },
          {
            "type": "MultiPolygon",
            "coordinates": [
              [
                [
                  [
                    -98,
                    35
                  ],
                  [
                    -97,
                    35
                  ],
                  [
                    -97,
                    36
                  ],
                  [
                    -98,
                    36
                  ],
                  [
                    -98,
                    35
                  ]
                ]
              ],
              [
                [
                  [
                    -96.5,
                    35.5
                  ],
                  [
                    -95.5,
                    35.5
                  ],
                  [
                    -95.5,
                    34.5
                  ],
                  [
                    -96.5,
                    34.5
                  ],
                  [
                    -96.5,
                    35.5
                  ]
                ],
                [
                  [
                    -96.2,
                    35.2
                  ],
                  [
                    -96.2,
                    34.8
                  ],
                  [
                    -95.8,
                    34.8
                  ],
                  [
                    -95.8,
                    35.2
                  ],
                  [
                    -96.2,
                    35.2
                  ]
                ]
              ]
            ]
          }
        ]
    }
}' id="map" viewBox="0 0 800 600"></svg>
    </div>
    <div class="col-md-5">
      <p>Multipolygon with MultiPoint</p>
    </div>
  </div>
  </div>

  <!-- Latest compiled and minified JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
    integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"
    integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V"
    crossorigin="anonymous"></script>

  <script type="module">
    import './js-geo-svg.js'
  </script>
</body>

</html>
