s<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Oklahoma GeoJSON → SVG Path Example</title>
  <style>svg{width:800px;height:600px;border:1px solid #ddd}</style>
</head>
<body>
  <h3>Oklahoma State Boundary from GeoJSON</h3>
  <svg id="map" viewBox="0 0 800 600"></svg>

  <script type="module">
    import {createSVGPathElement, getGeoJSONBounds} from './geojson-to-svg.js'

    // Oklahoma boundary in GeoJSON lon/lat coordinates
    const geojson = 
    {
      "type": "Feature",
      "properties": {
        "name": "Park Facility",
        "stroke": "black",
        "fill": "gree",
        "marker-color": "red"
      },
      "geometry": {
        "type": "GeometryCollection",
        "geometries": [
          {
            "type": "MultiPoint",
            "coordinates": [
                [-97.9,35.5],
                [-97.7,35.5]

              ]
          },
          {
            "type": "MultiPolygon",
            "coordinates": [
              [
                [
                  [
                    -98,
                    35
                  ],
                  [
                    -97,
                    35
                  ],
                  [
                    -97,
                    36
                  ],
                  [
                    -98,
                    36
                  ],
                  [
                    -98,
                    35
                  ]
                ]
              ],
              [
                [
                  [
                    -96.5,
                    35.5
                  ],
                  [
                    -95.5,
                    35.5
                  ],
                  [
                    -95.5,
                    34.5
                  ],
                  [
                    -96.5,
                    34.5
                  ],
                  [
                    -96.5,
                    35.5
                  ]
                ],
                [
                  [
                    -96.2,
                    35.2
                  ],
                  [
                    -96.2,
                    34.8
                  ],
                  [
                    -95.8,
                    34.8
                  ],
                  [
                    -95.8,
                    35.2
                  ],
                  [
                    -96.2,
                    35.2
                  ]
                ]
              ]
            ]
          }
        ]
      }
    }

    const [minX, minY, maxX, maxY] = getGeoJSONBounds(geojson)

    const width = 800
    const height = 600
    const padding = 20
    const scale = Math.min(
      (width - padding * 2) / (maxX - minX),
      (height - padding * 2) / (maxY - minY)
    )

    const projection = ([lon, lat]) => {
      const x = (lon - minX) * scale + padding
      const y = height - padding - (lat - minY) * scale
      return [x, y]
    }

    const svg = document.getElementById('map')
    const p = createSVGPathElement(geojson, { projection })
    svg.appendChild(p)
  </script>
</body>
</html>
